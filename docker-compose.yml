# docker-compose.yml
# Single-service stack for the ICSR Case Review API.
# State is held in memory; a container restart reseeds from classpath:case_v1.json.
#
# Usage:
#   make start          (delegates to ops/run.sh start)
#   docker compose up   (directly)

services:
  icsr-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: icsr-case-review:latest
    container_name: icsr-api

    ports:
      # Host port 8080 → container port 8080.
      # Change the left side if port 8080 is taken: e.g. "8081:8080"
      - "8080:8080"

    environment:
      # JAVA_TOOL_OPTIONS is read automatically by the JVM — no custom entrypoint needed.
      # Cap heap at 256 MB; the service is small and intentionally memory-frugal.
      JAVA_TOOL_OPTIONS: "-Xmx256m"

    healthcheck:
      # curl -f returns a non-zero exit code on HTTP errors, which Docker interprets as unhealthy.
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s      # check every 15 seconds after start_period
      timeout: 5s        # fail if no response within 5 seconds
      retries: 3         # mark unhealthy after 3 consecutive failures
      start_period: 30s  # give the JVM time to start before checks begin

    # Restart the container automatically unless it was explicitly stopped.
    restart: unless-stopped
