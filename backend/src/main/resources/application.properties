spring.application.name=icsr-case-review
server.port=8080

# Jackson: serialise Java camelCase <-> JSON snake_case automatically
spring.jackson.property-naming-strategy=SNAKE_CASE

# Omit null fields from all JSON responses (merge, previousValue, missingFields)
spring.jackson.default-property-inclusion=non_null

# Dates as ISO-8601 strings, not epoch millis
spring.jackson.serialization.write-dates-as-timestamps=false

# Don't blow up on unknown fields when deserialising (e.g. follow-up payloads)
spring.jackson.deserialization.fail-on-unknown-properties=false
